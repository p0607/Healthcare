# Reverse-proxy rules for q9lab.in/healthcare — copy to /etc/nginx/apps/healthcare.conf
# on the host, alongside vms.conf, lms.conf, etc. (included inside the main server{} block).
#
# Requires upstream blocks (wherever vms_backend/vms_frontend are defined, e.g.
# /etc/nginx/upstreams.conf or nginx.conf) such as:
#
#   upstream healthcare_backend {
#       server nursecare-api:5050;   # container name — reverse-proxy nginx must share
#   }                                 # the Docker network with the healthcare containers.
#                                      # Use 127.0.0.1:5050 instead if nginx runs on the host.
#
#   upstream healthcare_web {
#       server nursecare-web:80;     # container's internal nginx (serves the SPA build)
#   }                                 # Use 127.0.0.1:8080 instead if nginx runs on the host.

# REST API → backend container (bypasses the web container entirely)
location /healthcare/api/ {
    proxy_pass http://healthcare_backend/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
}

# Socket.IO (live nurse tracking, OTP sync) — needs WebSocket upgrade headers
location /healthcare/socket.io/ {
    proxy_pass http://healthcare_backend/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 86400;
}

# SPA + static assets — the web container's own nginx already knows how to serve
# everything under /healthcare/ (see frontend/nginx.conf), so no separate asset
# regex location is needed here (unlike vms_frontend, this isn't a raw dev server).
location ^~ /healthcare/ {
    proxy_pass http://healthcare_web/healthcare/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
}
