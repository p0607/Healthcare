# Nurse Care — Docker Compose (API + Web)
# Database: dedicated local PostgreSQL container (service "db", not published to the host —
# port 5432 is already taken by another app's Postgres on this server). DATABASE_URL in .env
# should point at db:5432 (see .env.production.example).

services:
  db:
    image: postgres:15-alpine
    container_name: nursecare-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nursecare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nurse_care}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nursecare} -d ${POSTGRES_DB:-nurse_care}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nursecare-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5050
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5050:5050"
    volumes:
      - api-catalog:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5050/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /healthcare/api
        VITE_SOCKET_PATH: /healthcare/socket.io
    container_name: nursecare-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  api-catalog:
  db-data:
