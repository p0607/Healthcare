# Nurse Care — Docker Compose (API + Web)
# Database: existing PostgreSQL server on the host (not containerized here). DATABASE_URL in
# .env must use "host.docker.internal" instead of "127.0.0.1" — see extra_hosts below, which
# maps that name to the host's real address (Docker Engine 20.10+ host-gateway feature).

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nursecare-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5050
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5050:5050"
    volumes:
      - api-catalog:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5050/api/health | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /healthcare/api
        VITE_SOCKET_PATH: /healthcare/socket.io
    container_name: nursecare-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  api-catalog:
