server {

    listen 80;

    server_name _;

    root /usr/share/nginx/html;

    index index.html;



    client_max_body_size 1m;



    gzip on;

    gzip_types text/plain text/css application/json application/javascript text/xml;



    add_header X-Frame-Options "SAMEORIGIN" always;

    add_header X-Content-Type-Options "nosniff" always;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    add_header Permissions-Policy "geolocation=(self), microphone=()" always;

    add_header X-XSS-Protection "1; mode=block" always;

    # Enable when TLS terminates here (HTTPS server block):

    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;



    # Redirect domain root (and any other path) to the /healthcare/ base

    location = / {

        return 301 /healthcare/;

    }



    # REST API → backend container (namespaced under /healthcare so it doesn't collide with
    # the other apps — /lms, /vms, etc. — sharing this domain behind the same reverse proxy)

    location /healthcare/api/ {

        rewrite ^/healthcare/(api/.*)$ /$1 break;

        proxy_pass http://api:5050;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

    }



    # SPA — React Router (served from /healthcare base path)

    location /healthcare/ {

        alias /usr/share/nginx/html/;

        try_files $uri $uri/ /healthcare/index.html;

    }



    # Socket.IO (live nurse tracking, OTP sync) — namespaced under /healthcare

    location /healthcare/socket.io/ {

        rewrite ^/healthcare/(socket\.io/.*)$ /$1 break;

        proxy_pass http://api:5050;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;

    }

}

